name: Sync to Public Repo

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare public content
        run: |
          set -euo pipefail

          # Save paths that should be preserved before bulk removal
          mkdir -p /tmp/preserve
          cp -r docs/api /tmp/preserve/docs_api 2>/dev/null || true

          # Read exclusion list and remove private paths
          # (copy ignore file first since it may delete itself)
          cp .public-sync-ignore /tmp/_sync_ignore
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* || "$line" == \!* ]] && continue
            echo "Removing: $line"
            rm -rf $line 2>/dev/null || true
          done < /tmp/_sync_ignore

          # Restore preserved paths
          mkdir -p docs
          cp -r /tmp/preserve/docs_api docs/api 2>/dev/null || true
          rm -rf /tmp/preserve /tmp/_sync_ignore

          # Replace copilot instructions with public version
          if [[ -f .github/copilot-instructions.public.md ]]; then
            cp .github/copilot-instructions.public.md .github/copilot-instructions.md
            rm .github/copilot-instructions.public.md
          fi

          # Remove files that only exist in the private repo
          rm -f .public-sync-ignore
          rm -f .github/workflows/sync-public.yml

          echo "=== Public content prepared ==="
          echo "Remaining top-level dirs:"
          ls -d */ .github/ 2>/dev/null || true

      - name: Verify no secrets leaked
        run: |
          set -euo pipefail
          LEAKED=0

          # Check for known secret patterns (partial matches to avoid false positives)
          for pattern in \
            "G66tdTcmvBz" \
            "401ca444cbe821f7" \
            "b82233d82380d025" \
            "47853887d009" \
            "60f6c6e78e61" \
            "d862dbdcbc54" \
            "b6dc8fbb1fec" \
            "EozRApYGFxDx" \
            "VLwttmyiMnzZ" \
            "clawnet-86a288c9"; do
            if grep -rq "$pattern" . --include='*.md' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.ts' --include='*.js' --include='*.sh' --include='*.env' 2>/dev/null; then
              echo "LEAK DETECTED: pattern '$pattern' found in public content!"
              grep -rl "$pattern" . --include='*.md' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.ts' --include='*.js' --include='*.sh' --include='*.env' 2>/dev/null
              LEAKED=1
            fi
          done

          if [[ $LEAKED -eq 1 ]]; then
            echo "::error::Secret leak detected! Aborting sync."
            exit 1
          fi
          echo "✅ No secrets detected in public content."

      - name: Configure Git
        run: |
          git config --global user.name "ClawNet Bot"
          git config --global user.email "bot@clawnetd.com"

      - name: Push to public repo
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail

          PUBLIC_REPO="https://x-access-token:${PUBLIC_REPO_PAT}@github.com/claw-network/clawnet.git"

          # Save original commit info before resetting git
          ORIG_MSG="$(git log -1 --format='%s' 2>/dev/null || echo 'initial sync')"
          ORIG_SHA="$(git log -1 --format='%h' 2>/dev/null || echo 'unknown')"

          # Create a fresh commit with only public content
          rm -rf .git
          git init -b main
          git add -A
          git commit -m "sync: ${ORIG_SHA} ${ORIG_MSG}"

          # Force push to public repo (single-commit history)
          git remote add public "$PUBLIC_REPO"
          git push public main --force

          # Sync tag if this is a tag push
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            git tag "$TAG"
            git push public "$TAG" --force
          fi

          echo "✅ Synced to public repo"
