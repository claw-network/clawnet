# ==============================================================================
# ClawNet Mainnet — Sync-Only / Read-Only Node (NO validator participation)
# ==============================================================================
# Hyperledger Besu — QBFT consensus
#
# Use this compose file for read-only nodes that do not participate in QBFT
# consensus. Useful for additional RPC endpoints or monitoring.
#
# For QBFT validators, use docker-compose.yml (primary) or
# docker-compose.peer.yml (peers) — no sync-first step needed.
# ==============================================================================

services:
  besu:
    image: hyperledger/besu:latest
    container_name: clawnet-besu
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xmx4g"
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "127.0.0.1:8545:8545/tcp"
    volumes:
      - /opt/clawnet/chain-data:/data
      - /opt/clawnet/config:/config:ro
    entrypoint:
      - besu
      - --data-path=/data
      - --genesis-file=/config/genesis.json
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,TXPOOL,QBFT,ADMIN
      - --rpc-http-cors-origins=*
      - --host-allowlist=*
      - --p2p-port=30303
      - --min-gas-price=0
      - --profile=ENTERPRISE
      - --bootnodes=${BOOTNODES}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
