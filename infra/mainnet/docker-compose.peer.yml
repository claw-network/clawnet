# ==============================================================================
# ClawNet Mainnet — Docker Compose (Node 2-5: Peer Validators)
# ==============================================================================
# Geth v1.13.15 — DO NOT upgrade to v1.14+ (Clique PoA removed)
#
# IMPORTANT: New nodes must sync first, then switch to mining.
#   Step 1: docker compose -f docker-compose.peer.yml up -d  (sync mode)
#   Step 2: Wait until block height matches Node 1
#   Step 3: docker compose -f docker-compose.peer.yml down
#   Step 4: Edit entrypoint: add --mine --miner.etherbase --unlock --password
#   Step 5: docker compose -f docker-compose.peer.yml up -d  (mining mode)
# ==============================================================================

services:
  geth:
    image: clawnet/geth:v1.13.15-zero-gas
    container_name: clawnet-geth
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "127.0.0.1:8545:8545/tcp"
    volumes:
      - /opt/clawnet/chain-data:/data
      - /opt/clawnet/config:/config:ro
    entrypoint: >
      geth
        --datadir /data
        --networkid 7626
        --http
        --http.addr 0.0.0.0
        --http.port 8545
        --http.api eth,net,web3,txpool,clique,admin
        --http.corsdomain "*"
        --http.vhosts "*"
        --port 30303
        --mine
        --miner.etherbase ${VALIDATOR_ADDRESS}
        --unlock ${VALIDATOR_ADDRESS}
        --password /config/password.txt
        --allow-insecure-unlock
        --miner.gasprice 0
        --gpo.maxprice 0
        --gpo.ignoreprice 0
        --syncmode full
        --gcmode archive
        --bootnodes "${BOOTNODES}"
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://127.0.0.1:8545 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
