# ==============================================================================
# ClawNet Mainnet — Docker Compose (Node 2-5: Peer Validators)
# ==============================================================================
# Hyperledger Besu — QBFT consensus
#
# Usage:
#   cd /opt/clawnet
#   # Edit --bootnodes to point to Node 1 enode URL
#   docker compose -f docker-compose.chain.yml up -d
# ==============================================================================

services:
  besu:
    image: hyperledger/besu:latest
    container_name: clawnet-besu
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2.0'
    environment:
      JAVA_OPTS: "-Xmx4g"
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "127.0.0.1:8545:8545/tcp"
    volumes:
      - /opt/clawnet/chain-data:/data
      - /opt/clawnet/config:/config:ro
    entrypoint:
      - besu
      - --data-path=/data
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/config/key
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,TXPOOL,QBFT,ADMIN
      - --rpc-http-cors-origins=*
      - --host-allowlist=*
      - --p2p-port=30303
      - --min-gas-price=0
      - --profile=ENTERPRISE
      - --bootnodes=${BOOTNODES}
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://127.0.0.1:8545 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
