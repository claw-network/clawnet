# ==============================================================================
# ClawNet Chain — Server A (Primary: Validator + Bootstrap + API Gateway)
# ==============================================================================
# Usage:
#   cd /opt/clawnet
#   cp infra/chain-testnet/docker-compose.yml docker-compose.chain.yml
#   docker compose -f docker-compose.chain.yml up -d
#   docker compose -f docker-compose.chain.yml logs -f
# ==============================================================================
# Hyperledger Besu — QBFT consensus
# ==============================================================================

services:
  besu:
    image: hyperledger/besu:latest
    container_name: clawnet-besu
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2.0'
    environment:
      JAVA_OPTS: "-Xmx4g"
    ports:
      - "30303:30303/tcp"       # P2P TCP
      - "30303:30303/udp"       # P2P Discovery
      - "8545:8545/tcp"         # JSON-RPC (Caddy will reverse-proxy; UFW blocks direct access)
    volumes:
      - /opt/clawnet/chain-data:/data
      - /opt/clawnet/config:/config:ro
    entrypoint:
      - besu
      - --data-path=/data
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/config/key
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,TXPOOL,QBFT,ADMIN
      - --rpc-http-cors-origins=*
      - --host-allowlist=*
      - --p2p-port=30303
      - --min-gas-price=0
      - --profile=ENTERPRISE
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://127.0.0.1:8545 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
