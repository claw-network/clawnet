# ==============================================================================
# ClawNet Chain — Sync-Only Mode (NO mining)
# ==============================================================================
# Use this compose file when adding a new validator node to an existing cluster.
#
# Strategy (sync-first-then-mine):
#   1. Start with this file — node syncs chain data from peers without mining
#   2. Wait until block number matches other validators
#   3. Stop this compose, start docker-compose.chain.yml (with --mine)
#
# WHY: If a new validator starts mining immediately, it creates a competing
#      block 1 fork, causing permanent "signed recently" deadlock.
# ==============================================================================
# Geth v1.13.15 — DO NOT upgrade to v1.14+ (Clique PoA removed)
# ==============================================================================

services:
  geth:
    image: ethereum/client-go:v1.13.15
    container_name: clawnet-geth
    restart: unless-stopped
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "127.0.0.1:8545:8545/tcp"
    volumes:
      - /opt/clawnet/chain-data:/data
      - /opt/clawnet/config:/config:ro
    entrypoint: >
      geth
        --datadir /data
        --networkid 7625
        --http
        --http.addr 0.0.0.0
        --http.port 8545
        --http.api eth,net,web3,txpool,clique,admin
        --http.corsdomain "*"
        --http.vhosts "*"
        --port 30303
        --syncmode full
        --gcmode archive
        --bootnodes "enode://<SERVER_A_ENODE_PUBKEY>@66.94.125.242:30303"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
